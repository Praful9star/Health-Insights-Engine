openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: CureCheck API - AI-powered health information platform
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: claim-checker
    description: Health claim verification
  - name: disease-journey
    description: Disease journey mapping
  - name: report-explainer
    description: Medical report explanation
  - name: symptom-checker
    description: Symptom analysis
  - name: medicine-explainer
    description: Medicine information
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /claim-checker:
    post:
      operationId: checkHealthClaim
      tags: [claim-checker]
      summary: Verify a health claim
      description: Analyze a health claim for credibility and evidence strength
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClaimInput"
      responses:
        "200":
          description: Claim analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClaimResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /disease-journey:
    post:
      operationId: getDiseaseJourney
      tags: [disease-journey]
      summary: Get disease journey map
      description: Generate an interactive disease journey timeline
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiseaseJourneyInput"
      responses:
        "200":
          description: Disease journey timeline
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiseaseJourneyResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /report-explainer:
    post:
      operationId: explainMedicalReport
      tags: [report-explainer]
      summary: Explain a medical report
      description: Convert complex medical terminology into simple language with detailed per-parameter analysis
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportInput"
      responses:
        "200":
          description: Report explanation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /ocr-report:
    post:
      operationId: ocrReport
      tags: [report-explainer]
      summary: Extract text from a medical report image
      description: Use AI vision to read and extract text from an uploaded medical report image
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OcrInput"
      responses:
        "200":
          description: Extracted text
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OcrResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /symptom-checker:
    post:
      operationId: checkSymptoms
      tags: [symptom-checker]
      summary: Analyze symptoms
      description: Analyze patient symptoms and provide urgency assessment and guidance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SymptomInput"
      responses:
        "200":
          description: Symptom analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SymptomResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /medicine-explainer:
    post:
      operationId: explainMedicine
      tags: [medicine-explainer]
      summary: Explain a medicine
      description: Get plain-language explanation of a medicine, its side effects, and interactions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MedicineInput"
      responses:
        "200":
          description: Medicine explanation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MedicineResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    ClaimInput:
      type: object
      required:
        - claim
      properties:
        claim:
          type: string
          minLength: 10
          description: The health claim text to verify
        language:
          type: string
          enum: [en, hi]
          description: Response language

    ClaimResult:
      type: object
      required:
        - credibilityScore
        - evidenceStrength
        - verdict
        - redFlags
        - whyMisleading
        - saferInterpretation
        - doctorQuestions
        - disclaimer
      properties:
        credibilityScore:
          type: integer
          minimum: 0
          maximum: 100
        evidenceStrength:
          type: string
          enum: [strong, moderate, weak, insufficient]
        verdict:
          type: string
          enum: [likely_true, partially_true, misleading, likely_false, unverifiable]
        summary:
          type: string
        redFlags:
          type: array
          items:
            type: string
        whyMisleading:
          type: string
        saferInterpretation:
          type: string
        doctorQuestions:
          type: array
          items:
            type: string
        disclaimer:
          type: string

    DiseaseJourneyInput:
      type: object
      required:
        - disease
        - ageGroup
      properties:
        disease:
          type: string
          minLength: 2
        ageGroup:
          type: string
          enum: [child, teen, adult, senior]
        language:
          type: string
          enum: [en, hi]

    DiseaseJourneyPhase:
      type: object
      required:
        - phase
        - title
        - description
        - duration
        - commonExperiences
        - warningSignsToWatch
      properties:
        phase:
          type: string
          enum: [initial, monitoring, treatment, recovery, ongoing_management]
        title:
          type: string
        description:
          type: string
        duration:
          type: string
        commonExperiences:
          type: array
          items:
            type: string
        warningSignsToWatch:
          type: array
          items:
            type: string

    DiseaseJourneyResult:
      type: object
      required:
        - disease
        - ageGroup
        - overview
        - phases
        - commonQuestions
        - supportResources
        - disclaimer
      properties:
        disease:
          type: string
        ageGroup:
          type: string
        overview:
          type: string
        phases:
          type: array
          items:
            $ref: "#/components/schemas/DiseaseJourneyPhase"
        commonQuestions:
          type: array
          items:
            type: string
        supportResources:
          type: array
          items:
            type: string
        disclaimer:
          type: string

    OcrInput:
      type: object
      required:
        - imageData
        - mimeType
      properties:
        imageData:
          type: string
          description: Base64-encoded image data (no data URI prefix)
        mimeType:
          type: string
          description: MIME type of the image (image/jpeg, image/png, etc.)

    OcrResult:
      type: object
      required:
        - extractedText
      properties:
        extractedText:
          type: string
        confidence:
          type: string
          enum: [high, medium, low]

    ReportInput:
      type: object
      required:
        - reportText
      properties:
        reportText:
          type: string
          minLength: 20
        language:
          type: string
          enum: [en, hi]

    ReportParameter:
      type: object
      required:
        - name
        - status
        - whatItMeans
        - whyItMatters
      properties:
        name:
          type: string
        userValue:
          type: string
        normalRange:
          type: string
        status:
          type: string
          enum: [low, normal, high, critical]
        whatItMeans:
          type: string
        whyItMatters:
          type: string
        causes:
          type: array
          items:
            type: string
        symptoms:
          type: array
          items:
            type: string
        lifestyle:
          type: array
          items:
            type: string
        urgency:
          type: string

    ReportTerm:
      type: object
      required:
        - term
        - simplifiedExplanation
      properties:
        term:
          type: string
        simplifiedExplanation:
          type: string

    ReportFinding:
      type: object
      required:
        - finding
        - importance
        - explanation
      properties:
        finding:
          type: string
        importance:
          type: string
          enum: [critical, important, normal, informational]
        explanation:
          type: string

    ReportResult:
      type: object
      required:
        - simpleSummary
        - keyTerms
        - importantFindings
        - doctorQuestions
        - overallAssessment
        - disclaimer
      properties:
        simpleSummary:
          type: string
        severity:
          type: string
          enum: [low_concern, moderate_concern, high_concern]
        severityReason:
          type: string
        parameters:
          type: array
          items:
            $ref: "#/components/schemas/ReportParameter"
        keyTerms:
          type: array
          items:
            $ref: "#/components/schemas/ReportTerm"
        importantFindings:
          type: array
          items:
            $ref: "#/components/schemas/ReportFinding"
        healthInsights:
          type: string
        positiveFindings:
          type: array
          items:
            type: string
        areasOfAttention:
          type: array
          items:
            type: string
        doctorQuestions:
          type: array
          items:
            type: string
        overallAssessment:
          type: string
          enum: [requires_urgent_attention, needs_follow_up, routine_monitoring, all_clear]
        disclaimer:
          type: string

    SymptomInput:
      type: object
      required:
        - symptoms
      properties:
        symptoms:
          type: string
          minLength: 5
        age:
          type: string
        gender:
          type: string
          enum: [male, female, other]
        duration:
          type: string
        language:
          type: string
          enum: [en, hi]

    SymptomCause:
      type: object
      required:
        - cause
        - likelihood
        - explanation
      properties:
        cause:
          type: string
        likelihood:
          type: string
          enum: [common, possible, rare]
        explanation:
          type: string

    SymptomResult:
      type: object
      required:
        - urgencyLevel
        - urgencyExplanation
        - possibleCauses
        - redFlags
        - immediateSteps
        - whenToSeekHelp
        - doctorSpeciality
        - disclaimer
      properties:
        urgencyLevel:
          type: string
          enum: [emergency, see_doctor_today, see_doctor_soon, home_care, monitor]
        urgencyExplanation:
          type: string
        possibleCauses:
          type: array
          items:
            $ref: "#/components/schemas/SymptomCause"
        redFlags:
          type: array
          items:
            type: string
        immediateSteps:
          type: array
          items:
            type: string
        whenToSeekHelp:
          type: string
        doctorSpeciality:
          type: string
        disclaimer:
          type: string

    MedicineInput:
      type: object
      required:
        - medicine
      properties:
        medicine:
          type: string
          minLength: 2
        language:
          type: string
          enum: [en, hi]

    MedicineSideEffect:
      type: object
      required:
        - effect
        - frequency
        - whatToDo
      properties:
        effect:
          type: string
        frequency:
          type: string
          enum: [very_common, common, uncommon, rare]
        whatToDo:
          type: string

    MedicineResult:
      type: object
      required:
        - medicineName
        - genericName
        - medicineClass
        - whatItTreats
        - howItWorks
        - commonSideEffects
        - foodInteractions
        - drugInteractions
        - importantWarnings
        - bestTimeTake
        - missedDose
        - storage
        - pharmacistQuestions
        - disclaimer
      properties:
        medicineName:
          type: string
        genericName:
          type: string
        medicineClass:
          type: string
        whatItTreats:
          type: array
          items:
            type: string
        howItWorks:
          type: string
        commonSideEffects:
          type: array
          items:
            $ref: "#/components/schemas/MedicineSideEffect"
        foodInteractions:
          type: array
          items:
            type: string
        drugInteractions:
          type: array
          items:
            type: string
        importantWarnings:
          type: array
          items:
            type: string
        bestTimeTake:
          type: string
        missedDose:
          type: string
        storage:
          type: string
        pharmacistQuestions:
          type: array
          items:
            type: string
        disclaimer:
          type: string
