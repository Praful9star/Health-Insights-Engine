<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CureCheck — No Connection</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      background: #070d0d;
      color: #e0f2f1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .logo {
      width: 72px; height: 72px;
      background: rgba(0,212,188,0.12);
      border: 1px solid rgba(0,212,188,0.2);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 2rem;
    }
    h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.5rem; }
    p { color: #6b9a97; font-size: 0.9rem; margin-bottom: 2rem; line-height: 1.6; max-width: 280px; }
    .em { display: flex; flex-direction: column; gap: 0.75rem; width: 100%; max-width: 260px; }
    a {
      display: block;
      padding: 0.875rem 1.25rem;
      border-radius: 14px;
      background: rgba(0,212,188,0.1);
      border: 1px solid rgba(0,212,188,0.15);
      color: #00d4bc;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.875rem;
    }
    .sos { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.2); color: #f87171; }
    button {
      margin-top: 1.5rem;
      padding: 0.75rem 2rem;
      border-radius: 14px;
      background: #00d4bc;
      color: #070d0d;
      font-weight: 700;
      font-size: 0.875rem;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="logo">💊</div>
  <h1>You're offline</h1>
  <p>No internet connection. Check your network and try again. In an emergency, call below.</p>
  <div class="em">
    <a href="tel:108" class="sos">🚑 108 — Ambulance (Free)</a>
    <a href="tel:104">📞 104 — Health Helpline</a>
    <a href="tel:9152987821">🧠 iCall — Mental Health</a>
  </div>
  <button onclick="location.reload()">Try Again</button>
</body>
</html>
