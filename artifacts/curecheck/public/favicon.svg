<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="fav-fill" x1="24" y1="3" x2="24" y2="46" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#7DBDF8"/>
      <stop offset="100%" stop-color="#1A6FE3"/>
    </linearGradient>
    <linearGradient id="fav-shine" x1="7" y1="3" x2="36" y2="26" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="white" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Shield fill -->
  <path d="M24,3 L41,10 L41,26 Q41,39 24,46 Q7,39 7,26 L7,10 Z" fill="url(#fav-fill)"/>
  <!-- Glass sheen -->
  <path d="M24,3 L41,10 L41,26 Q41,39 24,46 Q7,39 7,26 L7,10 Z" fill="url(#fav-shine)"/>
  <!-- White rim -->
  <path d="M24,3 L41,10 L41,26 Q41,39 24,46 Q7,39 7,26 L7,10 Z"
    stroke="rgba(255,255,255,0.32)" stroke-width="1" stroke-linejoin="round"/>
  <!-- ECG pulse — thicker stroke for legibility at 16 px -->
  <path d="M10,24 L16,24 L18,16 L20,32 L22,16 L24,32 L26,24 L38,24"
    stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
