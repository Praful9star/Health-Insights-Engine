kind = "web"
previewPath = "/"
title = "CureCheck"
version = "1.0.0"
id = "artifacts/curecheck"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25201

[services.development]
run = "pnpm --filter @workspace/curecheck run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/curecheck", "run", "build" ]
publicDir = "artifacts/curecheck/dist/public"
serve = "static"

# Root — prerendered with home-page metadata
[[services.production.rewrites]]
from = "/"
to = "/index.html"

# Tool pages — each served from its own prerendered HTML file
[[services.production.rewrites]]
from = "/claim-checker"
to = "/claim-checker/index.html"

[[services.production.rewrites]]
from = "/symptom-checker"
to = "/symptom-checker/index.html"

[[services.production.rewrites]]
from = "/report-explainer"
to = "/report-explainer/index.html"

[[services.production.rewrites]]
from = "/medicine-explainer"
to = "/medicine-explainer/index.html"

[[services.production.rewrites]]
from = "/disease-journey"
to = "/disease-journey/index.html"

[[services.production.rewrites]]
from = "/myth-buster"
to = "/myth-buster/index.html"

# Dynamic slug — falls back to shared shell (React handles client-side routing)
[[services.production.rewrites]]
from = "/myth-buster/*"
to = "/index.html"

[[services.production.rewrites]]
from = "/health-timeline"
to = "/health-timeline/index.html"

[[services.production.rewrites]]
from = "/fitness-hub"
to = "/fitness-hub/index.html"

[[services.production.rewrites]]
from = "/mental-health"
to = "/mental-health/index.html"

[[services.production.rewrites]]
from = "/hospitals"
to = "/hospitals/index.html"

[[services.production.rewrites]]
from = "/calculators"
to = "/calculators/index.html"

[[services.production.rewrites]]
from = "/emergency"
to = "/emergency/index.html"

[[services.production.rewrites]]
from = "/vaccines"
to = "/vaccines/index.html"

[[services.production.rewrites]]
from = "/ayurveda"
to = "/ayurveda/index.html"

[[services.production.rewrites]]
from = "/insurance"
to = "/insurance/index.html"

[[services.production.rewrites]]
from = "/pregnancy"
to = "/pregnancy/index.html"

[[services.production.rewrites]]
from = "/news"
to = "/news/index.html"

[[services.production.rewrites]]
from = "/drug-interaction"
to = "/drug-interaction/index.html"

[[services.production.rewrites]]
from = "/doctor-prep"
to = "/doctor-prep/index.html"

[[services.production.rewrites]]
from = "/premium"
to = "/premium/index.html"

[[services.production.rewrites]]
from = "/weather"
to = "/weather/index.html"

[[services.production.rewrites]]
from = "/about"
to = "/about/index.html"

[[services.production.rewrites]]
from = "/login"
to = "/login/index.html"

# Auth-gated and admin pages — served from shared shell
[[services.production.rewrites]]
from = "/dashboard"
to = "/index.html"

[[services.production.rewrites]]
from = "/profile"
to = "/index.html"

[[services.production.rewrites]]
from = "/admin-curecheck-secure"
to = "/index.html"

[[services.production.rewrites]]
from = "/feedback"
to = "/index.html"

[services.env]
PORT = "25201"
BASE_PATH = "/"
