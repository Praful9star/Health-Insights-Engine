kind = "video"
previewPath = "/curecheck-ad/"
title = "CureCheck — Video Ad"
version = "1.0.0"
id = "artifacts/curecheck-ad"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/curecheck-ad/" ]
localPort = 19109

[services.development]
run = "pnpm --filter @workspace/curecheck-ad run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/curecheck-ad", "run", "build" ]
publicDir = "artifacts/curecheck-ad/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19109"
BASE_PATH = "/curecheck-ad/"
